<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Look Graph filtered empty state</title>
  <desc id="desc">A graph panel with active filters and a no matching commits empty state with clear filter actions.</desc>
  <defs>
    <style>
      .bg { fill: #1f1f1f; }
      .panel { fill: #252526; }
      .surface { fill: #2d2d30; }
      .border { stroke: #3c3c3c; stroke-width: 1; }
      .text { fill: #cccccc; font-family: "Segoe UI", Arial, sans-serif; }
      .muted { fill: #9d9d9d; font-family: "Segoe UI", Arial, sans-serif; }
      .strong { fill: #ffffff; font-family: "Segoe UI Semibold", "Segoe UI", Arial, sans-serif; }
      .accent { fill: #3794ff; }
      .input { fill: #1f1f1f; stroke: #3c3c3c; }
      .chip { fill: #37373d; stroke: #55555b; stroke-width: 1; }
      .button { fill: #0e639c; }
      .ghost { fill: #333333; stroke: #5a5a5a; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="920" height="520" />
  <rect class="panel border" x="0.5" y="0.5" width="230" height="519" />
  <rect class="bg border" x="230.5" y="0.5" width="689" height="519" />

  <rect class="surface border" x="0.5" y="0.5" width="230" height="34" />
  <text class="strong" x="14" y="22" font-size="12">GRAPH</text>
  <rect class="surface border" x="230.5" y="0.5" width="689" height="34" />
  <rect class="input" x="246" y="7" width="180" height="21" rx="2" />
  <text class="text" x="270" y="22" font-size="12">feature/auth</text>
  <rect class="input" x="434" y="7" width="270" height="21" rx="2" />
  <text class="text" x="458" y="22" font-size="12">oauth callback</text>
  <rect class="input" x="712" y="7" width="92" height="21" rx="2" />
  <text class="text" x="724" y="22" font-size="12">Ada</text>
  <rect class="input" x="812" y="7" width="92" height="21" rx="2" />
  <text class="text" x="824" y="22" font-size="12">src/auth</text>

  <text class="strong" x="14" y="61" font-size="12">LOCAL</text>
  <circle cx="18" cy="84" r="4" fill="#3794ff" />
  <text class="text" x="34" y="88" font-size="13">feature/auth</text>
  <text class="muted" x="34" y="112" font-size="13">main</text>
  <text class="strong" x="14" y="152" font-size="12">REMOTE</text>
  <text class="muted" x="34" y="178" font-size="13">origin/main</text>

  <rect class="surface border" x="230.5" y="34.5" width="689" height="26" />
  <text class="muted" x="300" y="52" font-size="11">MESSAGE</text>
  <text class="muted" x="720" y="52" font-size="11">AUTHOR</text>
  <text class="muted" x="830" y="52" font-size="11">DATE</text>

  <g transform="translate(575 220)">
    <circle cx="-32" cy="-20" r="22" fill="none" stroke="#6a9955" stroke-width="2" opacity="0.45" />
    <line x1="-16" y1="-4" x2="14" y2="26" stroke="#6a9955" stroke-width="4" opacity="0.45" stroke-linecap="round" />
    <line x1="-64" y1="55" x2="100" y2="55" stroke="#3c3c3c" />
  </g>
  <text class="strong" x="430" y="300" font-size="18">No matching commits</text>
  <text class="muted" x="360" y="325" font-size="13">Try clearing one or more active filters.</text>

  <rect class="chip" x="344" y="348" width="128" height="24" rx="12" />
  <text class="text" x="360" y="364" font-size="12">branch: feature/auth</text>
  <text class="muted" x="454" y="364" font-size="12">x</text>
  <rect class="chip" x="482" y="348" width="126" height="24" rx="12" />
  <text class="text" x="498" y="364" font-size="12">text: oauth</text>
  <text class="muted" x="590" y="364" font-size="12">x</text>
  <rect class="chip" x="618" y="348" width="106" height="24" rx="12" />
  <text class="text" x="634" y="364" font-size="12">path: src/auth</text>
  <text class="muted" x="706" y="364" font-size="12">x</text>

  <rect class="button" x="441" y="394" width="96" height="30" rx="3" />
  <text class="strong" x="462" y="414" font-size="13">Clear all</text>
  <rect class="ghost" x="548" y="394" width="120" height="30" rx="3" />
  <text class="text" x="568" y="414" font-size="13">Show all branches</text>
</svg>
