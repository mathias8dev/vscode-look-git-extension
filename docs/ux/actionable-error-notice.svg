<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Actionable graph error notice</title>
  <desc id="desc">A graph panel fetch failure notice with retry and show output actions, without confusing it with unpublished branches.</desc>
  <defs>
    <style>
      .bg { fill: #1f1f1f; }
      .panel { fill: #252526; }
      .surface { fill: #2d2d30; }
      .border { stroke: #3c3c3c; stroke-width: 1; }
      .text { fill: #cccccc; font-family: "Segoe UI", Arial, sans-serif; }
      .muted { fill: #9d9d9d; font-family: "Segoe UI", Arial, sans-serif; }
      .strong { fill: #ffffff; font-family: "Segoe UI Semibold", "Segoe UI", Arial, sans-serif; }
      .danger { fill: #5a1d1d; stroke: #f48771; stroke-width: 1; }
      .dangerText { fill: #f48771; font-family: "Segoe UI Semibold", "Segoe UI", Arial, sans-serif; }
      .button { fill: #333333; stroke: #5a5a5a; stroke-width: 1; }
      .primary { fill: #0e639c; }
      .lane1 { stroke: #569cd6; stroke-width: 2; fill: none; }
      .lane2 { stroke: #c586c0; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="920" height="520" />
  <rect class="panel border" x="0.5" y="0.5" width="230" height="519" />
  <rect class="bg border" x="230.5" y="0.5" width="689" height="519" />
  <rect class="surface border" x="0.5" y="0.5" width="230" height="34" />
  <text class="strong" x="14" y="22" font-size="12">GRAPH</text>
  <rect class="surface border" x="230.5" y="0.5" width="689" height="34" />
  <text class="muted" x="248" y="22" font-size="12">Branch or tag</text>
  <text class="muted" x="435" y="22" font-size="12">Text or hash</text>

  <rect class="danger" x="246" y="46" width="650" height="58" rx="4" />
  <circle cx="268" cy="75" r="8" fill="none" stroke="#f48771" stroke-width="2" />
  <line x1="268" y1="69" x2="268" y2="76" stroke="#f48771" stroke-width="2" />
  <circle cx="268" cy="81" r="1.5" fill="#f48771" />
  <text class="dangerText" x="286" y="71" font-size="13">Fetch failed: origin</text>
  <text class="text" x="286" y="91" font-size="12">Remote exists, but Git could not authenticate. Last fetched data stays visible.</text>
  <rect class="primary" x="718" y="61" width="58" height="26" rx="3" />
  <text class="strong" x="735" y="79" font-size="12">Retry</text>
  <rect class="button" x="784" y="61" width="92" height="26" rx="3" />
  <text class="text" x="803" y="79" font-size="12">Show Output</text>

  <text class="strong" x="14" y="61" font-size="12">LOCAL</text>
  <text class="text" x="34" y="88" font-size="13">main</text>
  <text class="strong" x="14" y="128" font-size="12">REMOTE</text>
  <text class="text" x="34" y="154" font-size="13">origin/main</text>

  <rect class="surface border" x="230.5" y="116.5" width="689" height="26" />
  <text class="muted" x="300" y="134" font-size="11">MESSAGE</text>
  <text class="muted" x="720" y="134" font-size="11">AUTHOR</text>
  <text class="muted" x="830" y="134" font-size="11">DATE</text>

  <g transform="translate(260 158)">
    <path class="lane1" d="M18 0 L18 280" />
    <path class="lane2" d="M54 0 C54 60 100 50 100 98 C100 146 54 136 54 198 L54 280" />
    <circle cx="18" cy="18" r="4" fill="#569cd6" />
    <circle cx="18" cy="60" r="4" fill="#569cd6" />
    <circle cx="100" cy="98" r="4" fill="#c586c0" />
    <circle cx="54" cy="198" r="4" fill="#c586c0" />
    <circle cx="18" cy="245" r="4" fill="#569cd6" />
  </g>
  <text class="text" x="386" y="180" font-size="13">feat(graph): keep previous data visible on fetch failure</text>
  <text class="muted" x="722" y="180" font-size="12">Ada</text>
  <text class="muted" x="830" y="180" font-size="12">10:34</text>
  <text class="text" x="386" y="222" font-size="13">fix(remote): use VS Code Git credentials</text>
  <text class="muted" x="722" y="222" font-size="12">Mathias</text>
  <text class="muted" x="830" y="222" font-size="12">09:18</text>
</svg>
