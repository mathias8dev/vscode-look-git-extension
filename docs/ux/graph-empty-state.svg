<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Look Graph empty repository state</title>
  <desc id="desc">A VS Code-like graph panel showing a no commits yet empty state with actions to open changes and refresh.</desc>
  <defs>
    <style>
      .bg { fill: #1f1f1f; }
      .panel { fill: #252526; }
      .surface { fill: #2d2d30; }
      .border { stroke: #3c3c3c; stroke-width: 1; }
      .muted { fill: #9d9d9d; }
      .text { fill: #cccccc; font-family: "Segoe UI", Arial, sans-serif; }
      .strong { fill: #ffffff; font-family: "Segoe UI Semibold", "Segoe UI", Arial, sans-serif; }
      .accent { fill: #3794ff; }
      .button { fill: #0e639c; }
      .button-secondary { fill: #333333; stroke: #5a5a5a; stroke-width: 1; }
      .line { stroke: #6a9955; stroke-width: 2; fill: none; }
      .lane { stroke: #569cd6; stroke-width: 2; fill: none; }
      .chip { fill: #314f2d; }
    </style>
  </defs>

  <rect class="bg" width="920" height="520" />
  <rect class="panel border" x="0.5" y="0.5" width="230" height="519" />
  <rect class="bg border" x="230.5" y="0.5" width="689" height="519" />

  <rect class="surface border" x="0.5" y="0.5" width="230" height="34" />
  <text class="strong" x="14" y="22" font-size="12">GRAPH</text>
  <text class="muted text" x="210" y="22" font-size="13">...</text>

  <rect class="surface border" x="230.5" y="0.5" width="689" height="34" />
  <rect x="246" y="7" width="180" height="21" rx="2" fill="#1f1f1f" stroke="#3c3c3c" />
  <text class="muted text" x="270" y="22" font-size="12">Branch or tag</text>
  <circle cx="258" cy="17" r="5" fill="none" stroke="#9d9d9d" stroke-width="1.5" />
  <path d="M262 21l5 5" stroke="#9d9d9d" stroke-width="1.4" />
  <rect x="434" y="7" width="270" height="21" rx="2" fill="#1f1f1f" stroke="#3c3c3c" />
  <text class="muted text" x="458" y="22" font-size="12">Text or hash</text>
  <text class="muted text" x="722" y="22" font-size="13">fetch  pull  push  refresh</text>

  <text class="strong" x="14" y="61" font-size="12">LOCAL</text>
  <circle cx="18" cy="84" r="4" fill="none" stroke="#858585" stroke-width="1.4" />
  <line x1="18" y1="72" x2="18" y2="96" stroke="#858585" stroke-width="1" />
  <text class="text" x="34" y="88" font-size="13">main</text>
  <rect class="chip" x="172" y="74" width="46" height="18" rx="9" />
  <text class="text" x="182" y="87" font-size="10">unborn</text>
  <text class="strong" x="14" y="128" font-size="12">REMOTE</text>
  <text class="muted text" x="34" y="154" font-size="13">No remote configured</text>
  <text class="strong" x="14" y="198" font-size="12">WORKTREES</text>
  <text class="muted text" x="34" y="224" font-size="13">main</text>

  <rect class="surface border" x="230.5" y="34.5" width="689" height="26" />
  <text class="muted text" x="300" y="52" font-size="11">MESSAGE</text>
  <text class="muted text" x="720" y="52" font-size="11">AUTHOR</text>
  <text class="muted text" x="830" y="52" font-size="11">DATE</text>

  <g transform="translate(555 226)">
    <path class="lane" d="M-34 -38 C-34 -20 -6 -20 -6 0 C-6 20 -34 20 -34 38" />
    <path class="line" d="M24 -38 C24 -12 -2 -12 -2 10 C-2 30 24 30 24 38" />
    <circle cx="-34" cy="-38" r="5" fill="#569cd6" />
    <circle cx="-6" cy="0" r="5" fill="#3794ff" />
    <circle cx="-34" cy="38" r="5" fill="#569cd6" />
    <circle cx="24" cy="-38" r="5" fill="#6a9955" />
    <circle cx="24" cy="38" r="5" fill="#6a9955" />
  </g>
  <text class="strong" x="443" y="308" font-size="18">No commits yet</text>
  <text class="muted text" x="376" y="333" font-size="13">Create the initial commit from the Changes panel.</text>
  <rect class="button" x="418" y="360" width="116" height="30" rx="3" />
  <text class="strong" x="440" y="380" font-size="13">Open Changes</text>
  <rect class="button-secondary" x="544" y="360" width="82" height="30" rx="3" />
  <text class="text" x="566" y="380" font-size="13">Refresh</text>
</svg>
