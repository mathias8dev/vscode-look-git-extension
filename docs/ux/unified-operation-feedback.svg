    <path d="M26 71l8 8M34 71l-8 8" stroke="#f48771" stroke-width="2" stroke-linecap="round" />
    <text class="strong" x="48" y="67" font-size="13">Could not push experimental.</text>
    <text class="muted" x="48" y="85" font-size="12">Authentication is required by the remote.</text>
    <rect class="button-primary" x="48" y="92" width="82" height="20" rx="3" />
