  <g transform="translate(320 710)">
    <text class="muted" x="0" y="0" font-size="12">Shared component placement: immediately below each toolbar, above content. Status survives refresh until resolved, dismissed, or superseded.</text>
    <text class="muted" x="0" y="22" font-size="12">Extension runner emits one semantic operation payload; each webview renders the same feedback bar with local labels and actions.</text>
  </g>
</svg>
