      <text class="text" x="40" y="21" font-size="13">feat(history): add commit multi-select checkboxes</text>
      <rect class="tag-blue" x="384" y="8" width="84" height="18" rx="3" />
      <text class="strong" x="396" y="21" font-size="10">experimental</text>
      <rect class="tag-purple" x="474" y="8" width="78" height="18" rx="3" />
      <text class="strong" x="486" y="21" font-size="10">origin/main</text>
      <text class="muted" x="690" y="21" font-size="12">mathias8dev</text>
      <text class="muted" x="766" y="21" font-size="12">18:34:12</text>

      <rect class="surface" x="0" y="36" width="802" height="34" />
      <rect x="12" y="45" width="15" height="15" rx="2" fill="#2d2d30" stroke="#858585" stroke-width="1.2" />
      <text class="text" x="40" y="57" font-size="13">fix(extension): route remote push through VS Code Git</text>
      <text class="muted" x="690" y="57" font-size="12">mathias8dev</text>
      <text class="muted" x="766" y="57" font-size="12">17:58:05</text>

      <rect class="surface" x="0" y="72" width="802" height="34" />
      <rect x="12" y="81" width="15" height="15" rx="2" fill="#2d2d30" stroke="#858585" stroke-width="1.2" />
      <text class="text" x="40" y="93" font-size="13">docs(ux): propose unified operation feedback</text>
      <text class="muted" x="690" y="93" font-size="12">mathias8dev</text>
      <text class="muted" x="766" y="93" font-size="12">16:42:51</text>
