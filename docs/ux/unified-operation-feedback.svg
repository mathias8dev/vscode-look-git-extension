    <text class="strong" x="452" y="67" font-size="13">Patch saved to feature-cleanup.patch.</text>
    <text class="muted" x="452" y="85" font-size="12">Secondary confirmation uses VS Code toast, panel state stays consistent.</text>
    <rect class="button" x="452" y="92" width="80" height="20" rx="3" />
    <text class="text" x="467" y="107" font-size="11">Open File</text>
    <rect class="button" x="538" y="92" width="58" height="20" rx="3" />
    <text class="text" x="553" y="107" font-size="11">Dismiss</text>

    <rect class="input" x="10" y="132" width="802" height="28" rx="3" />
    <circle cx="24" cy="146" r="5" fill="none" stroke="#858585" stroke-width="1.4" />
