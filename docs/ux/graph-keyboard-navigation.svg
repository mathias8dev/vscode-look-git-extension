<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Graph keyboard navigation proposal</title>
  <desc id="desc">A graph table showing focus ring, selected commit, and compact keyboard hints for arrow navigation.</desc>
  <defs>
    <style>
      .bg { fill: #1f1f1f; }
      .panel { fill: #252526; }
      .surface { fill: #2d2d30; }
      .border { stroke: #3c3c3c; stroke-width: 1; }
      .text { fill: #cccccc; font-family: "Segoe UI", Arial, sans-serif; }
      .muted { fill: #9d9d9d; font-family: "Segoe UI", Arial, sans-serif; }
      .strong { fill: #ffffff; font-family: "Segoe UI Semibold", "Segoe UI", Arial, sans-serif; }
      .selected { fill: #37373d; }
      .focus { fill: none; stroke: #3794ff; stroke-width: 2; }
      .hint { fill: #2d2d30; stroke: #55555b; stroke-width: 1; }
      .key { fill: #3c3c3c; stroke: #696969; stroke-width: 1; }
      .lane1 { stroke: #569cd6; stroke-width: 2; fill: none; }
      .lane2 { stroke: #c586c0; stroke-width: 2; fill: none; }
      .lane3 { stroke: #dcdcaa; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="920" height="520" />
  <rect class="panel border" x="0.5" y="0.5" width="230" height="519" />
  <rect class="bg border" x="230.5" y="0.5" width="689" height="519" />
  <rect class="surface border" x="0.5" y="0.5" width="230" height="34" />
  <text class="strong" x="14" y="22" font-size="12">GRAPH</text>
  <rect class="surface border" x="230.5" y="0.5" width="689" height="34" />
  <text class="muted" x="248" y="22" font-size="12">Search commits</text>

  <text class="strong" x="14" y="61" font-size="12">LOCAL</text>
  <rect class="selected" x="8" y="72" width="214" height="24" rx="3" />
  <text class="text" x="34" y="88" font-size="13">main</text>
  <text class="muted" x="34" y="118" font-size="13">feature/keyboard</text>

  <rect class="surface border" x="230.5" y="34.5" width="689" height="26" />
  <text class="muted" x="300" y="52" font-size="11">MESSAGE</text>
  <text class="muted" x="720" y="52" font-size="11">AUTHOR</text>
  <text class="muted" x="830" y="52" font-size="11">DATE</text>

  <g transform="translate(230 61)">
    <rect class="selected" x="0" y="96" width="689" height="28" />
    <rect class="focus" x="2" y="97" width="685" height="26" rx="2" />
    <path class="lane1" d="M46 0 L46 330" />
    <path class="lane2" d="M78 0 C78 62 124 54 124 110 C124 170 78 158 78 230 L78 330" />
    <path class="lane3" d="M110 0 L110 330" />
    <circle cx="46" cy="14" r="4" fill="#569cd6" />
    <circle cx="78" cy="42" r="4" fill="#c586c0" />
    <circle cx="46" cy="70" r="4" fill="#569cd6" />
    <circle cx="124" cy="110" r="5" fill="#c586c0" />
    <circle cx="46" cy="154" r="4" fill="#569cd6" />
    <circle cx="110" cy="198" r="4" fill="#dcdcaa" />
    <circle cx="78" cy="242" r="4" fill="#c586c0" />
    <text class="text" x="150" y="19" font-size="13">feat(graph): add roving keyboard focus</text>
    <text class="text" x="150" y="47" font-size="13">fix(graph): preserve selection after refresh</text>
    <text class="text" x="150" y="75" font-size="13">test(graph): cover arrow navigation</text>
    <text class="strong" x="150" y="115" font-size="13">refactor(graph): keyboard selection model</text>
    <text class="text" x="150" y="159" font-size="13">docs(graph): add accessibility notes</text>
    <text class="muted" x="492" y="115" font-size="12">Mathias</text>
    <text class="muted" x="600" y="115" font-size="12">12:22:18</text>
  </g>

  <rect class="hint" x="552" y="378" width="322" height="96" rx="5" />
  <text class="strong" x="572" y="402" font-size="13">Keyboard model</text>
  <rect class="key" x="572" y="418" width="34" height="24" rx="3" />
  <text class="text" x="584" y="435" font-size="12">Up</text>
  <rect class="key" x="612" y="418" width="50" height="24" rx="3" />
  <text class="text" x="624" y="435" font-size="12">Down</text>
  <text class="muted" x="674" y="435" font-size="12">Move focus</text>
  <rect class="key" x="572" y="448" width="48" height="24" rx="3" />
  <text class="text" x="584" y="465" font-size="12">Enter</text>
  <text class="muted" x="634" y="465" font-size="12">Open details</text>
  <rect class="key" x="744" y="448" width="44" height="24" rx="3" />
  <text class="text" x="756" y="465" font-size="12">Menu</text>
  <text class="muted" x="798" y="465" font-size="12">Context</text>
</svg>
