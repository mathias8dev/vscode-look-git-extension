name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - name: Normalize git line endings (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - run: npm test

  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - name: Normalize git line endings (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Run integration tests
        if: runner.os != 'Linux'
        run: npm run test:integration
      - name: Run integration tests under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration
      - name: Run E2E tests
        if: runner.os != 'Linux'
        run: npm run test:e2e
      - name: Run E2E tests under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e
      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.os }}
          path: artifacts/e2e
          if-no-files-found: ignore

  release:
    name: Release
    needs: [unit, e2e]
    # Only release once the whole matrix is green, and only from pushes to a release/* branch
    # (never on PRs or other branches — those must not create tags/releases).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Resolve version and tag state
        id: meta
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "vsix=look-git-$version.vsix" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$version already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Package VSIX
        if: steps.meta.outputs.exists == 'false'
        run: npm run vsix
      - name: Create tag and GitHub release
        if: steps.meta.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          files: ${{ steps.meta.outputs.vsix }}
          fail_on_unmatched_files: true
          generate_release_notes: true
