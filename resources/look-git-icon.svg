<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Magnifying glass lens -->
  <path fill-rule="evenodd" clip-rule="evenodd"
    d="M6.5 1a5.5 5.5 0 1 0 3.47 9.823l3.603 3.604a.75.75 0 1 0 1.06-1.06L11.03 9.763A5.5 5.5 0 0 0 6.5 1zM2.5 6.5a4 4 0 1 1 8 0 4 4 0 0 1-8 0z"/>
  <!-- Commit dot (main, center of lens) -->
  <circle cx="6.5" cy="6.5" r="1.1"/>
  <!-- Branch line up-left -->
  <rect x="6" y="3.3" width="1" height="2.4" rx="0.5"/>
  <!-- Branch line down -->
  <rect x="6" y="7" width="1" height="2.2" rx="0.5"/>
  <!-- Feature branch node (upper right) -->
  <circle cx="8.8" cy="3.8" r="0.9"/>
  <!-- Feature branch line -->
  <path d="M7 5.6 C7 4.4 8.8 4.4 8.8 3.8" fill="none" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Top commit dot -->
  <circle cx="6.5" cy="3.1" r="0.9"/>
  <!-- Bottom commit dot -->
  <circle cx="6.5" cy="9.4" r="0.9"/>
</svg>
